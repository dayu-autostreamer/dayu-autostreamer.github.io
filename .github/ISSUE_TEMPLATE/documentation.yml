name: Documentation issue
description: Report unclear, missing, outdated, or incorrect Dayu documentation.
title: "[DOC] "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the Dayu documentation website.
  - type: input
    id: page
    attributes:
      label: Page or section
      description: Paste the page URL or repository path if you know it.
      placeholder: https://dayu-autostreamer.github.io/docs/...
    validations:
      required: true
  - type: dropdown
    id: language
    attributes:
      label: Language
      options:
        - English
        - 简体中文
        - Both
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What needs to be improved?
      description: Explain what is unclear, missing, outdated, or incorrect.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested correction
      description: Share the wording, source link, screenshot, or upstream Dayu change that should be reflected.
    validations:
      required: false
